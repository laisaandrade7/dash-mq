<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Minha Quitandinha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #090b0f;
      font-family: 'Inter', sans-serif;
      color: #eef0f6;
    }

    .login-card {
      background: #141820;
      border: 1px solid #1e2333;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .login-logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }

    .login-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #eef0f6;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 0.85rem;
      color: #5a6882;
      margin-bottom: 32px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #fff;
      color: #1f1f1f;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-google:hover { background: #f5f5f5; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .btn-google:active { background: #ebebeb; }

    .btn-google svg { flex-shrink: 0; }

    .login-error {
      display: none;
      margin-top: 20px;
      padding: 10px 14px;
      background: rgba(240,90,106,0.1);
      border: 1px solid rgba(240,90,106,0.2);
      border-radius: 8px;
      color: #f05a6a;
      font-size: 0.82rem;
    }

    .login-footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #2d3550;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="avatar-mq.png" alt="Minha Quitandinha" class="login-logo" />
    <div class="login-title">Minha Quitandinha</div>
    <div class="login-sub">Mercadinho das Meninas — Dashboard</div>

    <button class="btn-google" id="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 0 1 4.5 7.52V5.45H1.83a8 8 0 0 0 0 7.1l2.67-2.07z"/>
        <path fill="#EA4335" d="M8.98 3.58a4.3 4.3 0 0 1 3.05 1.19l2.28-2.28A7.64 7.64 0 0 0 8.98 1a8 8 0 0 0-7.15 4.45l2.67 2.07A4.77 4.77 0 0 1 8.98 3.58z"/>
      </svg>
      Entrar com Google
    </button>

    <div class="login-error" id="login-error">
      Acesso não autorizado. Use uma conta autorizada.
    </div>

    <div class="login-footer">Acesso restrito</div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
    const ALLOWED = ["laisa.andrade7@gmail.com", "alinedamoura@gmail.com"];
    const AUTH_KEY = "mq_auth";
    const AUTH_TTL = 8 * 60 * 60 * 1000;
    const CLIENT_ID = "34439969900-g4sm86q9moooejd81lmbr217fm6bm77l.apps.googleusercontent.com";

    // Se já autenticado, redireciona direto
    try {
      const s = JSON.parse(localStorage.getItem(AUTH_KEY));
      if (s && Date.now() < s.exp && ALLOWED.includes(s.email)) {
        const p = new URLSearchParams(location.search).get("next");
        location.replace(p && p.startsWith(location.origin) ? p : "index.html");
      }
    } catch {}

    function onGoogleToken(response) {
      const payload = JSON.parse(atob(response.credential.split(".")[1]));
      const email = payload.email;

      if (!ALLOWED.includes(email)) {
        document.getElementById("login-error").style.display = "block";
        google.accounts.id.disableAutoSelect();
        return;
      }

      localStorage.setItem(AUTH_KEY, JSON.stringify({ email, exp: Date.now() + AUTH_TTL }));
      const next = new URLSearchParams(location.search).get("next");
      location.replace(next && next.startsWith(location.origin) ? next : "index.html");
    }

    document.getElementById("btn-google").addEventListener("click", () => {
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: onGoogleToken,
        ux_mode: "popup",
      });
      google.accounts.id.prompt();
    });
  </script>
</body>
</html>
